version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mission-control-postgres
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mission_control
      POSTGRES_PASSWORD: localdev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_control -d mission_control"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: